<html>
<head>
<title>Simple Dashboard</title>

<style>
body{
    margin:0;
}
table{
    width:100%;
    border-collapse:collapse;
    background-color:grey;
}
td{
    padding:15px;
    text-align:center;
}
td a{
    color:white;
    text-decoration:none;
    padding:10px 25px;
}
td a:hover{
    background-color:lightgrey;
}
.sidebar{
    width:200px;
    height:100%;
    background-color:lightpink;
    padding:0;
    float:left;
}
.sidebar ul{
    list-style-type:none;
    padding:0;
    margin:0;
}
.sidebar li{
    padding:15px;
    border-bottom:1px solid black;
}
.sidebar li:hover{
    background-color:lightblue;
    cursor:pointer;
}
.content{
    margin-left:200px;
    padding:20px;
}
</style>

</head>

<body>

<table>
<tr>
<td><a href="#">Home</a></td>
<td><a href="#">Reports</a></td>
<td><a href="#">Settings</a></td>
<td><a href="#">Logout</a></td>
</tr>
</table>

<ul class="sidebar">
<li>Overview</li>
<li>Sales</li>
<li>Users</li>
<li>Support</li>
</ul>

<div class="content">
<h2>Dashboard</h2>
<p>Content here !!</p>
</div>

</body>
</html>
