<!DOCTYPE html>
<html>
<head>
<style>
.container{
    width:90%;
    margin:auto;
}
.boxes{
    display:flex;
    gap:20px;
}
.box{
    flex:1;
    padding:15px;
    background:#ccc;
    text-align:center;
}

.box img{
    max-width:100%;
    height:auto;
    display:block;
    margin:auto;
}
</style>
</head>
<body>
<div class="container">
    <div class="boxes">
        <div class="box">
            <img src="images/rcb_kohli.jpg">
        </div>
        <div class="box">
            <img src="images/faf.jpg">
        </div>
        <div class="box">
            <img src="images/max.jpg">
        </div>
    </div>
</div>
</body>
</html>
