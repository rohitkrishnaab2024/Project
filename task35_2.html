<!DOCTYPE html>
<html>
<head>
<title>VTOP Dashboard</title>

<script>
window.onload = function() {
    let user = localStorage.getItem("loggedUser");

        document.getElementById("welcome").textContent = "Welcome " + user;
    } else {
        window.location.href = "index.html";
    }
}
</script>

</head>

<body>

<h2 id="welcome"></h2>

</body>
</html>
