<!DOCTYPE html>
<html>
<head>
    <title>Multiple Modals</title>
    <style>
        body {
            background: #f4e1d2;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            font-family: "Times New Roman", Times, serif;
        }

        button {
            padding: 10px 20px;
            border-radius: 5px;
            background: maroon;
            cursor: pointer;
            font-weight: bold;
            color: white;
            border: none;
            font-family: "Times New Roman", Times, serif;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            z-index: -1;
            transition: opacity 0.3s ease;
            font-family: "Times New Roman", Times, serif;
        }

        .modal {
            background: #fffaf0;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            font-family: "Times New Roman", Times, serif;
        }

        .modal input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            font-family: "Times New Roman", Times, serif;
        }

        .modal h2 {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<button onclick="openModal('loginModal')">Open Login</button>
<button onclick="openModal('signupModal')">Open Signup</button>
<button onclick="openModal('confirmModal')">Open Confirmation</button>

<div class="overlay" id="loginModal">
    <div class="modal">
        <h2>Login</h2>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
    </div>
</div>

<div class="overlay" id="signupModal">
    <div class="modal">
        <h2>Signup</h2>
        <input type="text" placeholder="Email">
        <input type="password" placeholder="Password">
    </div>
</div>

<div class="overlay" id="confirmModal">
    <div class="modal">
        <h2>Confirmation</h2>
        <p>Your action was successful.</p>
    </div>
</div>

<script>
    let zIndexCounter = 1000;

    function openModal(id) {
        const modal = document.getElementById(id);
        zIndexCounter++;
        modal.style.zIndex = zIndexCounter;
        modal.style.opacity = "1";
    }

    document.querySelectorAll(".overlay").forEach(overlay => {
        overlay.addEventListener("click", function (e) {
            if (e.target === overlay) {
                overlay.style.opacity = "0";
                overlay.style.zIndex = "-1";
            }
        });
    });
</script>

</body>
</html>
